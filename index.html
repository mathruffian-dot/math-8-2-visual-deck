<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中數學八下整冊視覺化互動簡報</title>
  <meta name="description" content="國中數學八下整冊視覺化拖拉互動 HTML 簡報，涵蓋數列、函數、三角形、尺規作圖、全等、平行與四邊形。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">114 國中數學 2 下</p>
      <h1>八下數學一眼看懂</h1>
    </div>
    <div class="top-actions">
      <button class="icon-button" id="prevBtn" aria-label="上一個單元" title="上一個單元">
        <span aria-hidden="true">‹</span>
      </button>
      <button class="icon-button" id="nextBtn" aria-label="下一個單元" title="下一個單元">
        <span aria-hidden="true">›</span>
      </button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="lesson-panel" aria-label="單元清單">
      <div class="panel-heading">
        <h2>拖拉單元卡</h2>
        <p>把任一張卡拖到右側焦點區，畫面會切換到那個概念的視覺化模型。</p>
      </div>

      <div class="chapter-tabs" id="chapterTabs" role="tablist" aria-label="章節切換"></div>
      <div class="lesson-list" id="lessonList"></div>
    </aside>

    <section class="stage" aria-live="polite">
      <div class="stage-header">
        <div>
          <p class="stage-kicker" id="stageKicker">第 1 章</p>
          <h2 id="stageTitle">等差數列</h2>
        </div>
        <div class="stage-meter">
          <span id="lessonIndex">01</span>
          <span>/</span>
          <span id="lessonTotal">16</span>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="visual-wrap">
          <svg id="visualSvg" viewBox="0 0 900 520" role="img" aria-label="互動數學視覺圖"></svg>
        </div>
        <div class="concept-card">
          <p class="concept-label">學生要先感受到</p>
          <h3 id="bigIdea">規律不是背公式，是每一步都增加同樣的量。</h3>
          <div class="mini-grid">
            <div>
              <span>操作</span>
              <strong id="actionText">拖曳卡片或調整滑桿</strong>
            </div>
            <div>
              <span>關鍵語句</span>
              <strong id="keyText">固定差、項數、首項</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="control-strip">
        <label class="range-control">
          <span id="sliderLabel">項數</span>
          <input id="mainSlider" type="range" min="1" max="10" value="6">
          <strong id="sliderValue">6</strong>
        </label>
        <button class="text-button" id="shuffleBtn">快速巡覽</button>
      </div>
    </section>
  </main>

  <footer class="bottombar">
    <div id="progressDots" class="progress-dots" aria-label="簡報進度"></div>
    <p>依據教材資料夾章節製作的原創視覺化互動版，不上傳教科書 PDF。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
