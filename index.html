<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4-1 平行｜互動視覺化簡報</title>
  <meta name="description" content="國中數學八下 4-1 平行互動視覺化 HTML 簡報，包含平行線、截線八角、同位角、內錯角、同側內角與平行判別。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">114 國中數學 2 下｜第 4 章</p>
      <h1>4-1 平行</h1>
    </div>
    <div class="top-actions">
      <button class="icon-button" id="prevBtn" aria-label="上一個重點" title="上一個重點">‹</button>
      <button class="icon-button" id="nextBtn" aria-label="下一個重點" title="下一個重點">›</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="lesson-panel" aria-label="4-1 平行教學重點">
      <div class="panel-heading">
        <h2>教學重點</h2>
        <p>逐步點選或拖拉重點卡，右側會即時切換成對應的互動圖。</p>
      </div>
      <div class="lesson-list" id="lessonList"></div>
    </aside>

    <section class="stage" aria-live="polite">
      <div class="stage-header">
        <div>
          <p class="stage-kicker" id="stageKicker">重點 1</p>
          <h2 id="stageTitle">什麼是平行線</h2>
        </div>
        <div class="stage-meter">
          <span id="pointIndex">01</span>
          <span>/</span>
          <span id="pointTotal">08</span>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="visual-wrap">
          <svg id="visualSvg" viewBox="0 0 960 560" role="img" aria-label="4-1 平行互動視覺圖"></svg>
        </div>
        <div class="concept-card">
          <p class="concept-label">學生要先看見</p>
          <h3 id="bigIdea">兩條線方向相同、距離固定，延長也不相交。</h3>
          <div class="mini-grid">
            <div>
              <span>操作焦點</span>
              <strong id="actionText">調整距離與截線角度</strong>
            </div>
            <div>
              <span>關鍵語句</span>
              <strong id="keyText">同一平面、不相交、距離固定</strong>
            </div>
            <div>
              <span>課堂提問</span>
              <strong id="questionText">如果兩線延長很久都不交，還需要確認什麼？</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="control-strip">
        <label class="range-control">
          <span>截線角度</span>
          <input id="angleSlider" type="range" min="28" max="72" value="54">
          <strong id="angleValue">54°</strong>
        </label>
        <label class="range-control">
          <span>平行距離</span>
          <input id="gapSlider" type="range" min="110" max="210" value="160">
          <strong id="gapValue">160</strong>
        </label>
        <label class="toggle-control">
          <input id="parallelToggle" type="checkbox" checked>
          <span>保持平行</span>
        </label>
      </div>
    </section>
  </main>

  <footer class="bottombar">
    <div id="progressDots" class="progress-dots" aria-label="簡報進度"></div>
    <p>單節課版本：只聚焦 4-1 平行，所有圖形皆為原創互動視覺化。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
